services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml_network

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: producer
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ml_network

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: consumer
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      QUEUE_NAME: predict_queue
      MODEL_DIR: /app/model
    volumes:
      - ./model:/app/model:ro
    restart: on-failure
    networks:
      - ml_network

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api
    depends_on:
      rabbitmq:
        condition: service_healthy
      consumer:
        condition: service_started
    ports:
      - 8000:8000
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      QUEUE_NAME: predict_queue
      MODEL_DIR: /app/model
    volumes:
      - ./model:/app/model:ro
    restart: on-failure
    networks:
      - ml_network

volumes:
  rabbitmq_data:

networks:
  ml_network:
    driver: bridge
